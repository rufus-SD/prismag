name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=prismag-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p dist/${BINARY}
          go build -ldflags "-s -w -X github.com/rufus-SD/prismag/internal/cli.Version=${VERSION}" \
            -o dist/${BINARY}/prismag .
          tar -czf dist/${BINARY}.tar.gz -C dist ${BINARY}/

      - uses: actions/upload-artifact@v7
        with:
          name: prismag-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          shasum -a 256 *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
